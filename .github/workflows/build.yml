name: Build AI Studio APK
on: 
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Apply README.md Fixes
        run: |
          # 1. AI Studio ki requirement ke hisab se .env file banana
          echo "GEMINI_API_KEY=dummy_key_for_compilation" > .env
          
          # 2. README instruction: debugConfig line ko remove karna taaki CI/CD par error na aaye
          sed -i 's/signingConfig = signingConfigs.getByName("debugConfig")//g' app/build.gradle.kts

      - name: Build APK (Clean Assemble)
        run: gradle clean assembleDebug --no-daemon

      - name: Upload Final Workable APK
        uses: actions/upload-artifact@v4
        with:
          name: GameAssist-Ready-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          
